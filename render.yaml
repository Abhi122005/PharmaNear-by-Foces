services:
  # 1. The Node.js Backend
  - type: web
    name: pharmanear-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: pnpm install --prod
    startCommand: pnpm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: MONGO_URL
        sync: false # Requires manual entry of the database connection string in Render Dashboard
      - key: JWT_SECRET
        generateValue: true # Render automatically generates a secure string
      - key: CORS_ORIGIN
        value: "https://pharmanear-aneu.onrender.com"

  # 2. The React/Vite Frontend
  - type: web
    name: pharmanear-frontend
    env: static
    rootDir: frontend
    buildCommand: pnpm install && pnpm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20
      # Set this to your backend URL (without trailing slash) in the Render dashboard
      - key: VITE_BACKEND_URL
        sync: false
